name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Tests Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/backend/requirements-dev.txt

      - name: Instalar dependencias
        run: |
          cd apps/backend
          pip install -r requirements-dev.txt

      - name: Linting (ruff)
        run: |
          cd apps/backend
          ruff check .

      - name: Tests con cobertura
        run: |
          cd apps/backend
          pytest tests/ -v --cov=. --cov-report=xml --cov-fail-under=70
        env:
          AI_PROVIDER: mock
          BACKEND_PORT: '8765'

      - name: Auditoría de dependencias
        run: |
          pip install pip-audit
          pip-audit -r apps/backend/requirements.txt --ignore-vuln PYSEC-2022-42974

  test-frontend:
    name: Tests TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Typecheck
        run: npm run typecheck --workspaces --if-present

      - name: Tests
        run: npm run test --workspaces --if-present

      - name: Auditoría npm
        run: npm audit --audit-level=high
