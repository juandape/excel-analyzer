name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias Node
        run: npm ci

      - name: Instalar dependencias Python
        run: |
          cd apps/backend
          pip install -r requirements.txt pyinstaller

      - name: Empaquetar backend (PyInstaller)
        run: bash scripts/build-backend.sh

      - name: Build shared-types
        run: npm run build --workspace=packages/shared-types

      - name: Build app Electron
        run: |
          cd apps/desktop
          npm run build

      - name: Generar instalador macOS
        run: |
          cd apps/desktop
          npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Subir artefacto macOS
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: apps/desktop/dist/*.dmg
          retention-days: 7

  build-win:
    name: Build Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias Node
        run: npm ci

      - name: Instalar dependencias Python
        run: |
          cd apps/backend
          pip install -r requirements.txt pyinstaller

      - name: Empaquetar backend (PyInstaller)
        shell: bash
        run: bash scripts/build-backend.sh

      - name: Build shared-types
        run: npm run build --workspace=packages/shared-types

      - name: Build app Electron
        run: |
          cd apps/desktop
          npm run build

      - name: Generar instalador Windows
        run: |
          cd apps/desktop
          npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Subir artefacto Windows
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: apps/desktop/dist/*.exe
          retention-days: 7

  release:
    name: Publicar Release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Descargar artefacto macOS
        uses: actions/download-artifact@v4
        with:
          name: mac-installer
          path: dist/

      - name: Descargar artefacto Windows
        uses: actions/download-artifact@v4
        with:
          name: win-installer
          path: dist/

      - name: Obtener versión del package.json
        id: version
        run: echo "version=$(node -p "require('./apps/desktop/package.json').version")" >> $GITHUB_OUTPUT

      - name: Crear o actualizar Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Excel Analyzer v${{ steps.version.outputs.version }}
          body: |
            ## Descargas

            | Plataforma | Archivo |
            |---|---|
            | macOS | `Excel.Analyzer.dmg` |
            | Windows | `Excel.Analyzer.Setup.exe` |

            > Instala, configura tu proveedor de IA en ⚙ Configuración y comienza a analizar.
          files: dist/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
