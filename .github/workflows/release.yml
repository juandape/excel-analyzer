name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS (.dmg)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar 7zip del sistema (macOS)
        run: |
          brew install p7zip || true
          mkdir -p node_modules/7zip-bin/mac/arm64
          BIN=$(find /opt/homebrew/bin /usr/local/bin -maxdepth 1 \( -name "7zz" -o -name "7za" \) 2>/dev/null | head -1)
          cp "$BIN" node_modules/7zip-bin/mac/arm64/7za
          chmod +x node_modules/7zip-bin/mac/arm64/7za

      - name: Instalar dependencias Node
        run: npm install

      - name: Instalar dependencias Python
        run: |
          cd apps/backend
          pip install -r requirements.txt pyinstaller

      - name: Empaquetar backend (PyInstaller)
        run: bash scripts/build-backend.sh

      - name: Build shared-types
        run: npm run build --workspace=packages/shared-types

      - name: Build app Electron
        run: |
          cd apps/desktop
          npm run build

      - name: Generar instalador macOS
        run: |
          cd apps/desktop
          npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Subir artefacto macOS
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: apps/desktop/dist/*.dmg
          retention-days: 7

  build-win:
    name: Build Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Preparar 7zip para electron-builder (Windows)
        run: |
          New-Item -ItemType Directory -Force -Path node_modules\7zip-bin\win\x64
          $candidates = @(
            "C:\Program Files\7-Zip\7z.exe",
            "C:\Program Files\7-Zip\7za.exe",
            "C:\ProgramData\chocolatey\bin\7za.exe",
            "C:\ProgramData\chocolatey\bin\7z.exe"
          )
          $bin = $null
          foreach ($c in $candidates) { if (Test-Path $c) { $bin = $c; break } }
          if (-not $bin) {
            choco install 7zip -y --no-progress
            foreach ($c in $candidates) { if (Test-Path $c) { $bin = $c; break } }
          }
          if (-not $bin) { $bin = (Get-ChildItem "C:\ProgramData\chocolatey\lib\7zip" -Recurse -Filter "7z*.exe" | Select-Object -First 1).FullName }
          Write-Host "Usando: $bin"
          Copy-Item $bin node_modules\7zip-bin\win\x64\7za.exe

      - name: Instalar dependencias Node
        run: npm install

      - name: Instalar dependencias Python
        run: |
          cd apps/backend
          pip install -r requirements.txt pyinstaller

      - name: Empaquetar backend (PyInstaller)
        shell: bash
        run: bash scripts/build-backend.sh

      - name: Build shared-types
        run: npm run build --workspace=packages/shared-types

      - name: Build app Electron
        run: |
          cd apps/desktop
          npm run build

      - name: Generar instalador Windows
        run: |
          cd apps/desktop
          npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Subir artefacto Windows
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: apps/desktop/dist/*.exe
          retention-days: 7

  release:
    name: Publicar Release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Descargar artefacto macOS
        uses: actions/download-artifact@v4
        with:
          name: mac-installer
          path: dist/

      - name: Descargar artefacto Windows
        uses: actions/download-artifact@v4
        with:
          name: win-installer
          path: dist/

      - name: Obtener versión del package.json
        id: version
        run: echo "version=$(node -p "require('./apps/desktop/package.json').version")" >> $GITHUB_OUTPUT

      - name: Crear o actualizar Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Excel Analyzer v${{ steps.version.outputs.version }}
          body: |
            ## Descargas

            | Plataforma | Archivo |
            |---|---|
            | macOS | `Excel.Analyzer.dmg` |
            | Windows | `Excel.Analyzer.Setup.exe` |

            > Instala, configura tu proveedor de IA en ⚙ Configuración y comienza a analizar.
          files: dist/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
