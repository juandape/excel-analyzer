[tool.ruff]
line-length = 100
target-version = "py312"
select = ["E", "F", "W", "I", "UP", "S", "B"]
ignore = ["S101"]  # allow assert in tests

[tool.ruff.per-file-ignores]
"tests/**" = ["S", "B"]

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.pytest.ini_options]
testpaths = ["apps/backend/tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["apps/backend"]
omit = ["apps/backend/tests/*", "apps/backend/main.py"]

[tool.coverage.report]
fail_under = 80
show_missing = true
