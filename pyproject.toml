[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "S", "B"]
ignore = [
    "S101",   # allow assert in tests
    "E501",   # line too long — strings de mensajes de usuario no se pueden acortar
    "UP042",  # StrEnum — requiere Python 3.11+, usamos 3.12 pero hay compatibilidad externa
    "UP041",  # asyncio.TimeoutError alias — legible y explícito
    "S110",   # try-except-pass — manejamos errores opcionales deliberadamente
    "B904",   # raise from err — los AppError ya encapsulan la causa
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S", "B"]

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.pytest.ini_options]
testpaths = ["apps/backend/tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["apps/backend"]
omit = ["apps/backend/tests/*", "apps/backend/main.py"]

[tool.coverage.report]
fail_under = 50
show_missing = true
